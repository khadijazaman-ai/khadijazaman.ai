<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Head circle -->
  <circle cx="200" cy="140" r="60" fill="#ffffff" opacity="0.95"/>
  
  <!-- Body -->
  <ellipse cx="200" cy="280" rx="75" ry="90" fill="#ffffff" opacity="0.95"/>
  
  <!-- Hair -->
  <path d="M 140 100 Q 140 70 200 70 Q 260 70 260 100" fill="#2d3748" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="135" r="5" fill="#2d3748"/>
  <circle cx="215" cy="135" r="5" fill="#2d3748"/>
  
  <!-- Smile -->
  <path d="M 185 150 Q 200 160 215 150" stroke="#2d3748" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.7">
    Profile Picture
  </text>
</svg>